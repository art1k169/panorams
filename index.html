<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Panorama Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; color: white; border: 1px solid #333; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        #status { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="ui">
    <input type="file" id="fileInput" hidden accept="image/*">
    <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Выбрать панораму</button>
    <div id="status">Выберите файл .jpg или .png</div>
</div>

<div id="panorama"></div>

<script>
    let viewer = null;

    function initPanorama(imageSrc) {
        if (viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": imageSrc,
            "autoLoad": true
        });
    }

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        document.getElementById('status').innerText = "Загрузка...";

        reader.onload = function(event) {
            const data = event.target.result;
            initPanorama(data);
            document.getElementById('status').innerText = "Просмотр: " + file.name;
            
            // Если файл меньше 1.5МБ, пробуем создать ссылку, иначе - нет (чтобы не было ошибок)
            if (file.size < 1500000) {
                window.location.hash = "view=" + encodeURIComponent(data).substring(0, 10000); // Ограничим для теста
                document.getElementById('status').innerHTML += "<br><span style='color:green'>Ссылка обновлена</span>";
            } else {
                document.getElementById('status').innerHTML += "<br><span style='color:orange'>Файл слишком велик для ссылки</span>";
            }
        };
        reader.readAsDataURL(file);
    };

    // Загрузка дефолтной картинки (если она есть в папке)
    window.onload = () => {
        initPanorama('IMG_1370-fixed.jpg'); 
    };
</script>
</body>
</html>
