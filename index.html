<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панорама 360°</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; background: #111; }

        .ui-panel {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: rgba(40, 40, 40, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            backdrop-filter: blur(8px);
        }

        .btn:hover { background: rgba(80, 80, 80, 0.9); }

        .code-box {
            position: relative;
            display: none; /* Скрыт пока нет фото */
        }

        .code-box:hover .dropdown { opacity: 1; visibility: visible; }

        .dropdown {
            position: absolute;
            top: 100%; left: 0;
            margin-top: 5px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden;
            transition: 0.2s;
            min-width: 140px;
        }

        .code-value {
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            color: #e91e63;
            display: block;
            margin-top: 5px;
        }

        #codeInput {
            padding: 10px;
            border-radius: 6px;
            border: none;
            width: 120px;
            background: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <input type="file" id="fileInput" hidden accept="image/*">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Загрузить фото</button>

        <div class="code-box" id="codeWrapper">
            <button class="btn">🔑 Код фото</button>
            <div class="dropdown">
                <small style="color: #666">Ваш код:</small>
                <span class="code-value" id="displayCode">----------</span>
            </div>
        </div>

        <input type="text" id="codeInput" placeholder="Вставить код...">
        <button class="btn" onclick="applyCode()" style="background: #007bff;">Открыть</button>
    </div>

    <div id="panorama"></div>

    <script>
        let viewer = null;
        let currentPhotos = {}; // Хранилище сессии

        // Функция запуска панорамы
        function renderPano(imagePath) {
            if (viewer) viewer.destroy();

            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imagePath,
                "autoLoad": true,
                "autoRotate": -1,
                "friction": 0.15,
                "zoomDuration": 1200, // Плавный зум
                "animationTimingFunction": "easeInOutQuart",
                "mouseZoom": true,
                "showControls": true
            });
        }

        // Генератор кода
        function makeId() {
            return Math.random().toString(36).substring(2, 12).toUpperCase();
        }

        // Обработка файла
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const objectURL = URL.createObjectURL(file);
            const newCode = makeId();

            // Сохраняем в текущую сессию
            currentPhotos[newCode] = objectURL;

            // Обновляем интерфейс
            document.getElementById('displayCode').innerText = newCode;
            document.getElementById('codeWrapper').style.display = 'block';

            renderPano(objectURL);
        };

        // Открытие по коду
        function applyCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (currentPhotos[code]) {
                renderPano(currentPhotos[code]);
                document.getElementById('displayCode').innerText = code;
            } else {
                alert("Код не найден. Загрузите фото заново, чтобы получить новый код.");
            }
        }

        // Загрузка начального фото при запуске
        window.onload = () => {
            // Если в папке лежит IMG_1370-fixed.jpg, оно откроется. 
            // Если нет — просто будет черный экран до первой загрузки.
            renderPano('IMG_1370-fixed.jpg'); 
        };
    </script>

</body>
</html>
