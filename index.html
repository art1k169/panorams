<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Panorama Viewer + Cloud Memory</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #111; }
        #panorama { width: 100%; height: 100vh; }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            transition: 0.2s;
        }
        .btn:hover { background: #333; border-color: #2196F3; }

        .code-wrapper {
            position: relative;
            padding-bottom: 25px; /* Мост для ховера */
            margin-bottom: -25px;
        }

        .code-trigger-btn { background: #2196F3; border: none; font-weight: bold; }

        .code-popup {
            display: none;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 280px;
            text-align: center;
        }

        .code-wrapper:hover .code-popup { display: block; }
        
        .generated-code {
            font-family: monospace;
            font-size: 22px;
            font-weight: bold;
            color: #d32f2f;
            display: block;
            margin: 10px 0;
            background: #fdf0f0;
            padding: 8px;
            border-radius: 6px;
            border: 1px dashed #d32f2f;
        }

        .input-group { display: flex; gap: 5px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        #inputCode { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; text-transform: uppercase; }
        .go-btn { background: #28a745; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <label class="btn">Загрузить фото <input type="file" id="fileInput" accept="image/*"></label>

        <div class="code-wrapper">
            <div class="btn code-trigger-btn">Код / Поделиться</div>
            <div class="code-popup">
                <small style="color: #888">Ваш текущий код:</small>
                <span class="generated-code" id="generatedCode">------</span>
                
                <div class="input-group">
                    <input type="text" id="inputCode" placeholder="Вставьте код" maxlength="10">
                    <button class="go-btn" onclick="loadByCode()">ОК</button>
                </div>
            </div>
        </div>
    </div>

    <div id="panorama"></div>

    <script>
        let viewer = null;

        // Инициализация вьювера с плавным зумом
        function initPanorama(imageSrc) {
            if (viewer) viewer.destroy();
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imageSrc,
                "autoLoad": true,
                "zoomDuration": 1500, // Очень плавный зум
                "animationTimingFunction": "easeInOutQuart"
            });
        }

        function generateId() {
            return Math.random().toString(36).substring(2, 12).toUpperCase();
        }

        // Загрузка нового файла
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imageData = event.target.result;
                const newCode = generateId();

                initPanorama(imageData);
                document.getElementById('generatedCode').innerText = newCode;

                // СОХРАНЯЕМ В ПАМЯТЬ БРАУЗЕРА
                try {
                    localStorage.setItem(newCode, imageData);
                } catch (e) {
                    alert("Фото слишком тяжелое для памяти браузера, но оно будет работать, пока вы не обновите страницу.");
                }
            };
            reader.readAsDataURL(file);
        });

        // Поиск по коду в LocalStorage
        function loadByCode() {
            const code = document.getElementById('inputCode').value.trim().toUpperCase();
            const savedImage = localStorage.getItem(code);
            
            if (savedImage) {
                initPanorama(savedImage);
                document.getElementById('generatedCode').innerText = code;
                alert("Успешно загружено из памяти!");
            } else {
                alert("Код не найден. Либо вы очистили кэш, либо это фото было загружено на другом компьютере.");
            }
        }

        // Стартовое фото
        window.onload = () => {
            initPanorama('https://pannellum.org/images/alma.jpg');
        };
    </script>
</body>
</html>
