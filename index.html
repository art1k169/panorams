<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Panorama Viewer</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; }

        .controls {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover { background: #27ae60; }
        .btn-share { background: #3498db; }
        .btn-share:hover { background: #2980b9; }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Выбрать фото</button>
        <button class="btn btn-share" onclick="copyShareLink()">🔗 Копировать ссылку</button>
    </div>

    <div id="panorama"></div>

    <script>
        let viewer = null;
        let currentImgName = 'IMG_1370-fixed.jpg'; // Имя по умолчанию

        // Функция запуска панорамы
        function initPano(source) {
            if (viewer) viewer.destroy();

            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": source,
                "autoLoad": true,
                "autoRotate": -1,
                "friction": 0.1,
                "zoomDuration": 1500,
                "animationTimingFunction": "easeInOutQuart",
                "mouseZoom": true,
                "showControls": true
            });
        }

        // 1. Обработка локальной загрузки (для теста)
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            currentImgName = file.name; // Запоминаем имя для ссылки
            const reader = new FileReader();
            reader.onload = (event) => initPano(event.target.result);
            reader.readAsDataURL(file);
        };

        // 2. Функция "Поделиться"
        function copyShareLink() {
            // Создаем ссылку вида: https://твой-сайт.io/?img=название_файла.jpg
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?img=${currentImgName}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Ссылка скопирована!\nУбедитесь, что файл с именем '" + currentImgName + "' загружен в ваш репозиторий GitHub.");
            });
        }

        // 3. Логика при открытии страницы
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const imgFromUrl = urlParams.get('img');

            if (imgFromUrl) {
                currentImgName = imgFromUrl;
                initPano(imgFromUrl);
            } else {
                // Пытаемся открыть дефолтное фото
                initPano(currentImgName);
            }
        };
    </script>

</body>
</html>
