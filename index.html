<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Панорамы</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; }

        .ui-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            color: white; min-width: 200px;
        }

        .share-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; }

        .btn {
            background: #3498db; color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer;
            width: 100%; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #2980b9; }

        input {
            width: 100%; padding: 8px; border-radius: 5px; border: none;
            margin-bottom: 10px; background: #222; color: white; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <h3 style="margin: 0 0 10px 0; font-size: 16px;">🌐 Открыть панораму</h3>
    
    <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">Введите имя файла из папки:</p>
    <input type="text" id="fileNameInput" placeholder="Например: 1.jpg">
    <button class="btn" onclick="loadByInput()">Посмотреть</button>

    <div class="share-box">
        <button class="btn" style="background: #2ecc71;" onclick="copyLink()">🔗 Ссылка для друга</button>
        <p id="status" style="font-size: 10px; color: #2ecc71; margin-top: 5px; display: none;">Ссылка скопирована!</p>
    </div>
</div>

<div id="panorama"></div>

<script>
    let viewer = null;
    let currentFile = "IMG_1370-fixed.jpg"; // Начальный файл

    function render(file) {
        if (viewer) viewer.destroy();
        currentFile = file;

        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": file,
            "autoLoad": true,
            "friction": 0.15,
            "zoomDuration": 1200,
            "animationTimingFunction": "easeInOutQuart",
            "mouseZoom": true
        });
    }

    // Загрузка по названию файла
    function loadByInput() {
        const val = document.getElementById('fileNameInput').value.trim();
        if (val) render(val);
    }

    // Генерация ссылки
    function copyLink() {
        const url = new URL(window.location.href);
        url.searchParams.set('img', currentFile);
        
        navigator.clipboard.writeText(url.href).then(() => {
            const status = document.getElementById('status');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        });
    }

    // При загрузке страницы
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const imgParam = params.get('img');
        
        if (imgParam) {
            render(imgParam);
        } else {
            render(currentFile);
        }
    };
</script>

</body>
</html>
