<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панорама с кодом</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        #panorama { width: 100%; height: 100vh; }

        /* Верхняя панель */
        .top-bar {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Кнопка с кодом и выпадашка */
        .code-container {
            position: relative;
            display: inline-block;
        }

        .btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }

        .btn:hover { background: rgba(255,255,255,0.4); }

        .code-dropdown {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 100%; left: 0;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 4px;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            min-width: 150px;
        }

        .code-container:hover .code-dropdown {
            visibility: visible;
            opacity: 1;
        }

        .code-text {
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            color: #007bff;
        }

        input[type="text"] {
            padding: 7px;
            border-radius: 4px;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        <button class="btn" onclick="document.getElementById('fileInput').click()">Загрузить фото</button>

        <div class="code-container" id="codeSection" style="display:none">
            <button class="btn">🔑 Код фото</button>
            <div class="code-dropdown">
                Код: <span class="code-text" id="generatedCode">----------</span>
            </div>
        </div>

        <input type="text" id="codeInput" placeholder="Введите код...">
        <button class="btn" onclick="loadByCode()">Открыть</button>
    </div>

    <div id="panorama"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script>
        let viewer = null;

        // Инициализация панорамы с плавным зумом
        function initPano(imgData) {
            if (viewer) viewer.destroy();
            
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imgData,
                "autoLoad": true,
                "friction": 0.1,        // Плавность остановки
                "animationTimingFunction": "easeInOutCubic", // Плавный зум
                "zoomDuration": 1000,   // Скорость зума
                "mouseZoom": true
            });
        }

        // Генерация случайного кода (10 символов)
        function generateId() {
            return Math.random().toString(36).substr(2, 10).toUpperCase();
        }

        // Загрузка файла
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgData = event.target.result;
                const newCode = generateId();

                // Сохраняем в память браузера
                localStorage.setItem(newCode, imgData);

                // Показываем код
                document.getElementById('generatedCode').innerText = newCode;
                document.getElementById('codeSection').style.display = 'block';

                initPano(imgData);
            };
            reader.readAsDataURL(file);
        });

        // Открытие по коду
        function loadByCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const savedImg = localStorage.getItem(code);

            if (savedImg) {
                initPano(savedImg);
                document.getElementById('generatedCode').innerText = code;
                document.getElementById('codeSection').style.display = 'block';
            } else {
                alert("Код не найден или срок действия истек");
            }
        }

        // Загрузка стандартного фото при старте (если оно есть в папке)
        window.onload = () => {
            initPano('IMG_1370-fixed.jpg'); 
        };
    </script>

</body>
</html>
