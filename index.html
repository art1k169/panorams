<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Custom Street View</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Стили окна панорамы */
        #panorama-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: none;
        }
        #close-pano {
            position: absolute; top: 20px; right: 20px; z-index: 1001;
            padding: 10px 20px; background: white; border: none; cursor: pointer; border-radius: 5px;
        }

        /* Окно загрузки */
        .custom-popup { padding: 10px; min-width: 200px; }
        .custom-popup input { display: block; margin-bottom: 10px; width: 100%; }
        .custom-popup button { width: 100%; background: #4285f4; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }

        /* Тот самый человечек */
        #pegman {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: #fbbc05; border-radius: 50%; cursor: grab; z-index: 500;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="pegman" draggable="true">🚶‍♂️</div>

<div id="panorama-container">
    <button id="close-pano">❌ Закрыть</button>
    <div id="panorama" style="width: 100%; height: 100%;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([55.75, 37.61], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let savedPoints = []; // Хранилище точек
    let currentCoords = null;

    // 1. Клик правой кнопкой — вызываем меню
    map.on('contextmenu', (e) => {
        currentCoords = e.latlng;
        const content = `
            <div class="custom-popup">
                <strong>Добавить панораму</strong><br><br>
                <input type="text" id="p-name" placeholder="Название места">
                <input type="file" id="p-file" accept="image/*">
                <button onclick="savePoint()">Создать точку</button>
            </div>
        `;
        L.popup().setLatLng(e.latlng).setContent(content).openOn(map);
    });

    // 2. Сохранение точки с картинкой
    function savePoint() {
        const name = document.getElementById('p-name').value;
        const fileInput = document.getElementById('p-file');
        
        if (!name || !fileInput.files[0]) {
            alert("Введите название и выберите фото!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const imgData = e.target.result; // base64 картинки
            
            const marker = L.marker(currentCoords).addTo(map);
            marker.bindTooltip(name, { permanent: true, direction: 'top' });
            
            // Сохраняем данные в массив для проверки человечком
            savedPoints.push({
                latlng: currentCoords,
                image: imgData,
                marker: marker
            });
            
            map.closePopup();
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // 3. Логика человечка (Drag & Drop)
    const pegman = document.getElementById('pegman');

    pegman.addEventListener('dragend', (e) => {
        // Получаем координаты, куда бросили человечка
        const point = map.mouseEventToLatLng(e);
        
        // Ищем ближайшую сохраненную точку в радиусе
        let found = null;
        savedPoints.forEach(p => {
            const dist = map.distance(point, p.latlng);
            if (dist < 100) { // Если бросили ближе чем в 100 метрах от точки
                found = p;
            }
        });

        if (found) {
            openPanorama(found.image);
        } else {
            alert("Здесь нет панорамы! Бросайте человечка на созданный маркер.");
        }
    });

    // 4. Открытие 3D панорамы
    function openPanorama(img) {
        document.getElementById('panorama-container').style.display = 'block';
        
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": img,
            "autoLoad": true
        });
    }

    // Закрытие
    document.getElementById('close-pano').onclick = () => {
        document.getElementById('panorama-container').style.display = 'none';
    };
</script>

</body>
</html>
