<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Panorama Viewer</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            background: #111; 
        }

        #panorama { 
            width: 100%; 
            height: 100vh; 
        }

        /* Контейнер управления */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        /* Общие стили кнопок */
        .btn {
            background: rgba(40, 40, 40, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            transition: all 0.2s;
            display: inline-block;
        }
        .btn:hover { background: #333; border-color: #2196F3; }

        /* Секция с кодом и "мост" для ховера */
        .code-wrapper {
            position: relative;
            padding-bottom: 20px; /* Тот самый невидимый мост */
            margin-bottom: -20px;
        }

        .code-trigger-btn {
            background: #2196F3;
            border: none;
            font-weight: bold;
        }

        /* Всплывающее окно */
        .code-popup {
            display: none;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 260px;
            text-align: center;
        }

        /* Показываем при наведении на обертку */
        .code-wrapper:hover .code-popup {
            display: block;
        }

        .code-popup h3 { margin: 0 0 10px 0; font-size: 14px; color: #666; }
        
        .generated-code {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            color: #d32f2f;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 15px;
            background: #fdf0f0;
            padding: 5px;
            border-radius: 4px;
        }

        .input-group {
            display: flex;
            gap: 5px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        #inputCode {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .go-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <label class="btn">
            Загрузить фото
            <input type="file" id="fileInput" accept="image/*">
        </label>

        <div class="code-wrapper">
            <div class="btn code-trigger-btn">Код / Поделиться</div>
            <div class="code-popup">
                <h3>Ваш код панорамы:</h3>
                <span class="generated-code" id="generatedCode">НЕТ ФОТО</span>
                
                <div class="input-group">
                    <input type="text" id="inputCode" placeholder="Код..." maxlength="10">
                    <button class="go-btn" onclick="loadByCode()">ОК</button>
                </div>
            </div>
        </div>
    </div>

    <div id="panorama"></div>

    <script>
        let viewer = null;
        let storedImages = {}; // Имитация базы данных (работает до перезагрузки)

        // Функция инициализации вьювера
        function initPanorama(imageSrc) {
            if (viewer) viewer.destroy(); // Удаляем старую, если была
            
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imageSrc,
                "autoLoad": true,
                "autoRotate": -2, // Легкое вращение для красоты
                "friction": 0.1,  // Плавность остановки
                "zoomDuration": 1200, // Плавный зум (мс)
                "animationTimingFunction": "easeInOutQuad",
                "showControls": true
            });
        }

        // Генератор 10 символов
        function generateId() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Без похожих 0/O или 1/I
            let result = '';
            for (let i = 0; i < 10; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Логика выбора файла
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imageData = event.target.result;
                const newCode = generateId();

                // 1. Запускаем панораму
                initPanorama(imageData);

                // 2. Показываем код
                document.getElementById('generatedCode').innerText = newCode;

                // 3. Сохраняем в "базу"
                storedImages[newCode] = imageData;
                
                console.log("Фото загружено. Код:", newCode);
            };
            reader.readAsDataURL(file);
        });

        // Логика ввода кода
        function loadByCode() {
            const code = document.getElementById('inputCode').value.trim().toUpperCase();
            
            if (storedImages[code]) {
                initPanorama(storedImages[code]);
                document.getElementById('generatedCode').innerText = code;
                alert("Панорама по коду " + code + " загружена!");
            } else {
                alert("Код не найден! Напоминание: так как это статичная страница без сервера, коды работают только пока вы не обновили вкладку.");
            }
        }

        // Загрузка дефолтной картинки (пример)
        window.onload = () => {
            initPanorama('https://pannellum.org/images/alma.jpg');
        };
    </script>
</body>
</html>
