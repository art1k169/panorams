<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панорама Плеер</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
        }

        #panorama {
            width: 100%;
            height: 100vh;
        }

        /* Панель управления */
        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="file"] {
            color: white;
        }

        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #0056b3; }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="copyLink()">Поделиться</button>
    </div>

    <div id="panorama"></div>
    <div class="hint">Крути мышкой, приближай колесиком</div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script>
        let viewer = null;

        // Инициализация пустого плеера (черный экран)
        function initViewer(imageSrc) {
            if (viewer) viewer.destroy(); // Удаляем старый, если был
            
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imageSrc,
                "autoLoad": true,
                "compass": true,
                "mouseZoom": true
            });
        }

        // Обработка загрузки файла
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                // Запускаем панораму с загруженным фото
                initViewer(event.target.result);
            };
            reader.readAsDataURL(file);
        });

        // Заглушка для функции "Поделиться"
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert("Ссылка на сайт скопирована! (Примечание: чтобы другой человек увидел фото, оно должно лежать на GitHub или сервере)");
            });
        }

        // Загружаем начальное фото, если оно есть в папке (например, твое)
        window.onload = () => {
            initViewer('IMG_1370-fixed.jpg'); 
        };
    </script>

</body>
</html>
