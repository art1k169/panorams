<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Pro Storage</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #panorama { width: 100%; height: 100vh; }

        .ui-panel {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 1000;
            display: flex; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; backdrop-filter: blur(10px);
        }

        .btn {
            background: #333; color: white; border: 1px solid #555;
            padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }

        .btn:hover { background: #555; }

        .code-box { position: relative; display: none; }
        .code-box:hover .dropdown { opacity: 1; visibility: visible; }

        .dropdown {
            position: absolute; top: 100%; left: 0; margin-top: 8px;
            background: white; padding: 10px; border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: 0.2s; min-width: 140px;
        }

        .code-value { font-family: monospace; font-weight: bold; color: #ff4757; font-size: 1.1em; }

        input { padding: 8px; border-radius: 5px; border: none; width: 130px; }
    </style>
</head>
<body>

<div class="ui-panel">
    <input type="file" id="fileInput" hidden accept="image/*">
    <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Загрузить</button>

    <div class="code-box" id="codeWrapper">
        <button class="btn">🔑 Код</button>
        <div class="dropdown">
            <small style="color: #666">Ваш код:</small><br>
            <span class="code-value" id="displayCode">----------</span>
        </div>
    </div>

    <input type="text" id="codeInput" placeholder="Введите код...">
    <button class="btn" onclick="loadFromDB()" style="background: #1e90ff; border: none;">Открыть</button>
</div>

<div id="panorama"></div>

<script>
    let viewer = null;
    let db;

    // 1. Инициализация базы данных в браузере
    const request = indexedDB.open("PanoramaDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("photos");
    };
    request.onsuccess = e => { db = e.target.result; };

    function renderPano(imgData) {
        if (viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": imgData,
            "autoLoad": true,
            "friction": 0.1,
            "zoomDuration": 1500, // Очень плавный зум
            "animationTimingFunction": "easeInOutCubic",
            "mouseZoom": true
        });
    }

    // 2. Сохранение фото
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const imgData = event.target.result;
            const newCode = Math.random().toString(36).substring(2, 12).toUpperCase();

            const transaction = db.transaction(["photos"], "readwrite");
            transaction.objectStore("photos").add(imgData, newCode);

            document.getElementById('displayCode').innerText = newCode;
            document.getElementById('codeWrapper').style.display = 'block';
            renderPano(imgData);
        };
        reader.readAsDataURL(file);
    };

    // 3. Загрузка по коду (даже после перезагрузки)
    function loadFromDB() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code) return;

        const transaction = db.transaction(["photos"], "readonly");
        const getRequest = transaction.objectStore("photos").get(code);

        getRequest.onsuccess = () => {
            if (getRequest.result) {
                renderPano(getRequest.result);
                document.getElementById('displayCode').innerText = code;
                document.getElementById('codeWrapper').style.display = 'block';
            } else {
                alert("Код не найден в памяти этого браузера!");
            }
        };
    }

    window.onload = () => {
        // Попытка загрузить стандартное фото
        renderPano('IMG_1370-fixed.jpg');
    };
</script>

</body>
</html>
