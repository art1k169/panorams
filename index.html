<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Panorama Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #1a1a1a; }
        #panorama { width: 100%; height: 100vh; }

        /* Верхняя панель управления */
        .controls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        input[type="file"] { display: none; }
        .btn {
            background: #444;
            color: white;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #666;
            font-size: 14px;
        }
        .btn:hover { background: #666; }

        /* Секция с кодом (по наведению) */
        .code-section {
            position: relative;
            display: inline-block;
        }
        .code-trigger { background: #2196F3; border: none; }
        .code-popup {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 250px;
        }
        .code-section:hover .code-popup { display: block; }
        
        .code-display { font-family: monospace; font-weight: bold; color: #d32f2f; }
        #inputCode { width: 100px; padding: 2px; }
    </style>
</head>
<body>

    <div class="controls">
        <label class="btn">
            Загрузить фото
            <input type="file" id="fileInput" accept="image/*">
        </label>

        <div class="code-section">
            <button class="btn code-trigger">Код/Поделиться</button>
            <div class="code-popup">
                <div>Ваш код: <span class="code-display" id="generatedCode">------</span></div>
                <hr>
                <input type="text" id="inputCode" placeholder="Вставьте код">
                <button class="btn" onclick="loadByCode()" style="color: black; padding: 2px 5px;">Ок</button>
                <p style="font-size: 10px; margin-top: 5px; color: #666;">
                    *На GitHub используйте прямую ссылку на фото для генерации кода.
                </p>
            </div>
        </div>
    </div>

    <div id="panorama"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script>
        let viewer = null;

        // Инициализация пустого вьювера
        function initPanorama(imageSrc) {
            if (viewer) viewer.destroy();
            
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imageSrc,
                "autoLoad": true,
                "hfov": 110,
                "friction": 0.1, // Плавность вращения
                "zoomDuration": 1000, // Длительность плавного зума
                "animationTimingFunction": "easeInOutQuad"
            });
        }

        // Генерация рандомного кода (10 символов)
        function generateRandomCode() {
            return Math.random().toString(36).substring(2, 12).toUpperCase();
        }

        // Обработка загрузки файла
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                initPanorama(event.target.result);
                document.getElementById('generatedCode').innerText = generateRandomCode();
            };
            reader.readAsDataURL(file);
        });

        // "Логика" кодов для GitHub
        // Так как базы данных нет, мы будем кодировать URL картинки в "код" (Base64) 
        // или просто имитировать для вашего задания
        function loadByCode() {
            const code = document.getElementById('inputCode').value;
            if (code.length > 5) {
                alert("Загрузка панорамы по коду: " + code);
                // Здесь можно добавить логику поиска по массиву ссылок
            }
        }

        // Запуск заглушки при старте
        window.onload = () => {
            initPanorama('https://pannellum.org/images/alma.jpg'); 
        };
    </script>
</body>
</html>
