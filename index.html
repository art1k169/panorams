<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Custom Map & Panorama</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #map { flex: 1; height: 100%; }
        #pano { width: 400px; height: 100%; background: #333; color: white; display: none; }
        
        /* Стили для окна ввода */
        .custom-popup input { margin-bottom: 5px; width: 100%; }
        .custom-popup button { cursor: pointer; background: #4285f4; color: white; border: none; padding: 5px; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="pano"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=ВАШ_API_КЛЮЧ"></script>

    <script>
        // 1. Инициализация карты (OpenStreetMap)
        const map = L.map('map').setView([55.75, 37.61], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let lastRightClickPos = null;

        // 2. Обработка правого клика (ПКМ)
        map.on('contextmenu', function(e) {
            lastRightClickPos = e.latlng;

            const popupContent = `
                <div class="custom-popup">
                    <strong>Добавить место</strong><br>
                    <input type="text" id="placeName" placeholder="Название...">
                    <button onclick="saveLocation()">Создать точку</button>
                </div>
            `;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupContent)
                .openOn(map);
        });

        // 3. Сохранение точки и привязка панорамы
        function saveLocation() {
            const name = document.getElementById('placeName').value;
            if (!name) return;

            const marker = L.marker(lastRightClickPos).addTo(map);
            marker.bindPopup(`<b>${name}</b><br><button onclick="viewPano(${lastRightClickPos.lat}, ${lastRightClickPos.lng})">Смотреть панораму</button>`);
            
            map.closePopup();
        }

        // 4. Загрузка панорамы (Google Street View)
        function viewPano(lat, lng) {
            const panoElement = document.getElementById('pano');
            panoElement.style.display = 'block';

            const panorama = new google.maps.StreetViewPanorama(
                panoElement,
                {
                    position: { lat: lat, lng: lng },
                    pov: { heading: 34, pitch: 10 }
                }
            );
        }
    </script>
</body>
</html>
